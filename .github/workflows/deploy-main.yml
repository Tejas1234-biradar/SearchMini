name: Deploy On Main Push

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend-vercel:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_ORG_ID: team_8bYKQwHEqhq8pOouMEwKpFzi
      VERCEL_PROJECT_ID: prj_r4VRLbqcmZ7axOgSOCPVwD8AUCtH
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --yes --token "${{ secrets.VERCEL_TOKEN }}"

  deploy-backend-railway:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    needs: deploy-frontend-vercel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Deploy query-engine
        run: npx @railway/cli up ./src/query_engine --path-as-root --service "query-engine" --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy indexer
        run: npx @railway/cli up ./src/indexer --path-as-root --service "indexer" --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy crawler
        run: npx @railway/cli up ./src/crawler --path-as-root --service "crawler" --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy backlinks-processor (if service exists)
        run: |
          SERVICES_JSON="$(npx @railway/cli service list --json)"
          if echo "$SERVICES_JSON" | grep -q '"name": "backlinks-processor"'; then
            npx @railway/cli up ./src/backlinks-processor --path-as-root --service "backlinks-processor" --detach
          else
            echo "backlinks-processor service not provisioned on Railway; skipping deploy."
          fi
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
